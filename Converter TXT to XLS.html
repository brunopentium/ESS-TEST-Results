<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Conversor TXT → XLSX</title>

  <!-- CORRETO: importa a biblioteca XLSX.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

</head>
<body style="font-family:Arial; padding:24px">
  <h2>Conversor Automático TXT → XLSX</h2>
  <p>Selecione um ou mais arquivos TXT (separados por “;”):</p>

  <input type="file" id="files" accept=".txt" multiple />
  <button id="btnConv">Converter</button>

  <script>
    document.getElementById("btnConv").addEventListener("click", processar);

    function processar() {
      const input = document.getElementById("files");
      if (!input.files.length) {
        alert("Selecione arquivos primeiro!");
        return;
      }

      [...input.files].forEach(file => {
        const reader = new FileReader();
        reader.onload = e => {
          const texto = e.target.result;
          const linhas = texto.split(/\r?\n/).filter(l => l.trim() !== "");
          let dados = linhas.map(l => l.split(";"));
          dados = dados.map(linha => linha.map(campo => normalizarNumero(campo)));

          const ws = XLSX.utils.aoa_to_sheet(dados);
          tiparNumericos(ws);

          const wb = XLSX.utils.book_new();
          XLSX.utils.book_append_sheet(wb, ws, "Dados");

          XLSX.writeFile(wb, file.name.replace(".txt", ".xlsx"));
        };

        reader.readAsText(file, "utf-8");
      });

      alert("Conversão iniciada!");
    }

    function normalizarNumero(v) {
      let s = (v ?? "").trim();
      if (s === "") return s;

      const padraoUS = /^-?\d{1,3}(,\d{3})+(\.\d+)?$/;
      const padraoDecimal = /^-?\d+(\.\d+)?$/;
      const padraoEU = /^-?\d{1,3}(\.\d{3})+(,\d+)?$/;
      const padraoInt = /^-?\d+$/;

      if (padraoUS.test(s)) return s.replace(/,/g, "");
      if (padraoEU.test(s)) return s.replace(/\./g, "").replace(",", ".");
      if (padraoDecimal.test(s) || padraoInt.test(s)) return s;

      return v;
    }

    function tiparNumericos(ws) {
      const range = XLSX.utils.decode_range(ws["!ref"]);
      for (let R = range.s.r; R <= range.e.r; R++) {
        for (let C = range.s.c; C <= range.e.c; C++) {
          const addr = XLSX.utils.encode_cell({ r: R, c: C });
          const cell = ws[addr];
          if (!cell) continue;

          if (typeof cell.v === "string" && /^-?\d+(\.\d+)?$/.test(cell.v)) {
            const n = Number(cell.v);
            if (!isNaN(n)) {
              cell.v = n;
              cell.t = "n";
            }
          }
        }
      }
    }
  </script>

</body>
</html>
