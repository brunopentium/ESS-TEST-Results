<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Conversor TXT → XLSX</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body style="font-family:Arial; padding:24px">
  <h2>Conversor Automático TXT → XLSX</h2>
  <p>Selecione um ou mais arquivos TXT (separados por “;”):</p>

  <input type="file" id="files" accept=".txt" multiple />
  <button id="btnConv">Converter</button>

  <div style="margin-top:12px;">
    <label>
      <input type="checkbox" id="chkUnificar" />
      Gerar também um único arquivo Excel com todos os dados
    </label>
  </div>

  <script>
    document.getElementById("btnConv").addEventListener("click", processar);

    async function processar() {
      const input = document.getElementById("files");
      const unificar = document.getElementById("chkUnificar").checked;

      if (!input.files.length) {
        alert("Selecione arquivos primeiro!");
        return;
      }

      const arquivos = [...input.files];
      const dadosUnificados = [];
      let cabecalhoUnificado = null;

      for (let i = 0; i < arquivos.length; i++) {
        const file = arquivos[i];
        const texto = await lerArquivo(file);
        const linhas = texto.split(/\r?\n/).filter(l => l.trim() !== "");
        let dados = linhas.map(l => l.split(";"));
        dados = dados.map(linha => linha.map(campo => normalizarNumero(campo)));

        const ws = XLSX.utils.aoa_to_sheet(dados);
        tiparNumericos(ws);

        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Dados");

        const wsDefasagemIndividual = criarSheetDefasagem(dados, "Dados");
        if (wsDefasagemIndividual) {
          XLSX.utils.book_append_sheet(wb, wsDefasagemIndividual, "DEFASAGEM");
        }

        XLSX.writeFile(wb, file.name.replace(/\.txt$/i, ".xlsx"));

        if (unificar && dados.length > 0) {
          const nomeArquivo = file.name;
          const idxCabecalho = encontrarLinhaCabecalho(dados);
          const cabecalhoAtual = idxCabecalho >= 0 ? dados[idxCabecalho] : dados[0];

          if (!cabecalhoUnificado) {
            cabecalhoUnificado = ["Arquivo", ...cabecalhoAtual];
            dadosUnificados.push(cabecalhoUnificado);
          }

          const inicioDados = idxCabecalho >= 0 ? idxCabecalho + 1 : 1;
          const linhasDados = dados.slice(inicioDados);

          linhasDados.forEach(linha => {
            if (linhasSaoIguais(linha, cabecalhoAtual)) return;
            dadosUnificados.push([nomeArquivo, ...linha]);
          });
        }
      }

      if (unificar) {
        if (dadosUnificados.length > 0) {
          const [cabecalho, ...linhasDados] = dadosUnificados;
          linhasDados.sort((a, b) => {
            const nomeA = String(a?.[0] ?? "").trim();
            const nomeB = String(b?.[0] ?? "").trim();
            return nomeA.localeCompare(nomeB, "pt-BR", { sensitivity: "base", numeric: true });
          });

          dadosUnificados.length = 0;
          dadosUnificados.push(cabecalho, ...linhasDados);

          const wsUnificado = XLSX.utils.aoa_to_sheet(dadosUnificados);
          tiparNumericos(wsUnificado);

          const wbUnificado = XLSX.utils.book_new();
          XLSX.utils.book_append_sheet(wbUnificado, wsUnificado, "Unificado");

          const wsDefasagemUnificado = criarSheetDefasagem(dadosUnificados, "Unificado");
          if (wsDefasagemUnificado) {
            XLSX.utils.book_append_sheet(wbUnificado, wsDefasagemUnificado, "DEFASAGEM");
          }

          XLSX.writeFile(wbUnificado, "resultado_unificado.xlsx");

          alert("Conversão concluída! Arquivos individuais e unificado gerados.");
        } else {
          alert("Conversão concluída! Nenhum dado válido para unificar.");
        }
      } else {
        alert("Conversão concluída! Arquivos individuais gerados.");
      }
    }

    function encontrarLinhaCabecalho(dados) {
      for (let i = 0; i < dados.length; i++) {
        const linha = dados[i].map(c => String(c ?? "").trim().toLowerCase());
        const textoLinha = linha.join(" ");
        const temSpeed = textoLinha.includes("speed");
        const temAcqui = textoLinha.includes("#acqui") || textoLinha.includes("acqui");
        const temRev = textoLinha.includes("#rev") || textoLinha.includes("rev");
        const temFe = linha.some(c => /^fe\d+$/i.test(c));

        if ((temSpeed && temAcqui) || (temRev && temFe)) {
          return i;
        }
      }

      return -1;
    }

    function linhasSaoIguais(a, b) {
      if (!Array.isArray(a) || !Array.isArray(b) || a.length !== b.length) return false;

      for (let i = 0; i < a.length; i++) {
        if (String(a[i] ?? "").trim() !== String(b[i] ?? "").trim()) return false;
      }

      return true;
    }

    function lerArquivo(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = e => resolve(e.target.result);
        reader.onerror = () => reject(new Error(`Erro ao ler o arquivo: ${file.name}`));
        reader.readAsText(file, "utf-8");
      });
    }

    function normalizarNumero(v) {
      let s = (v ?? "").trim();
      if (s === "") return s;

      const padraoUS = /^-?\d{1,3}(,\d{3})+(\.\d+)?$/;
      const padraoDecimal = /^-?\d+(\.\d+)?$/;
      const padraoEU = /^-?\d{1,3}(\.\d{3})+(,\d+)?$/;
      const padraoInt = /^-?\d+$/;

      if (padraoUS.test(s)) return s.replace(/,/g, "");
      if (padraoEU.test(s)) return s.replace(/\./g, "").replace(",", ".");
      if (padraoDecimal.test(s) || padraoInt.test(s)) return s;

      return v;
    }

    function tiparNumericos(ws) {
      const range = XLSX.utils.decode_range(ws["!ref"]);
      for (let R = range.s.r; R <= range.e.r; R++) {
        for (let C = range.s.c; C <= range.e.c; C++) {
          const addr = XLSX.utils.encode_cell({ r: R, c: C });
          const cell = ws[addr];
          if (!cell) continue;

          if (typeof cell.v === "string" && /^-?\d+(\.\d+)?$/.test(cell.v)) {
            const n = Number(cell.v);
            if (!isNaN(n)) {
              cell.v = n;
              cell.t = "n";
            }
          }
        }
      }
    }

    function criarSheetDefasagem(dados, nomeAbaOrigem) {
      if (!Array.isArray(dados) || dados.length === 0) return null;

      const idxCabecalho = encontrarLinhaCabecalho(dados);
      const cabecalho = idxCabecalho >= 0 ? dados[idxCabecalho] : dados[0];
      const inicioDados = idxCabecalho >= 0 ? idxCabecalho + 1 : 1;

      if (!Array.isArray(cabecalho) || cabecalho.length === 0) return null;

      const colunasFe = [];
      for (let c = 0; c < cabecalho.length; c++) {
        if (/^fe\d+$/i.test(String(cabecalho[c] ?? "").trim())) {
          colunasFe.push(c);
        }
      }

      if (colunasFe.length === 0) return null;

      const primeiraColunaFe = colunasFe[0];
      const linhaReferencia = new Array(cabecalho.length).fill("");
      const colunaTituloRef = primeiraColunaFe > 0 ? primeiraColunaFe - 1 : 0;
      linhaReferencia[colunaTituloRef] = "REFERENCY";

      colunasFe.forEach(c => {
        linhaReferencia[c] = cabecalho[c];
      });

      const aoaDefasagem = [linhaReferencia, [...cabecalho]];

      for (let r = inicioDados; r < dados.length; r++) {
        const linhaOrigem = dados[r];
        if (linhasSaoIguais(linhaOrigem, cabecalho)) continue;

        const novaLinha = new Array(cabecalho.length).fill("");

        for (let c = 0; c < cabecalho.length; c++) {
          const valor = linhaOrigem?.[c] ?? "";
          if (colunasFe.includes(c)) {
            const letraColuna = XLSX.utils.encode_col(c);
            const linhaAbaOriginal = r + 1;
            novaLinha[c] = {
              f: `'${nomeAbaOrigem}'!${letraColuna}${linhaAbaOriginal}-${letraColuna}$1`
            };
          } else {
            novaLinha[c] = valor;
          }
        }

        aoaDefasagem.push(novaLinha);
      }

      return XLSX.utils.aoa_to_sheet(aoaDefasagem);
    }
  </script>
</body>
</html>
